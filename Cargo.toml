[package]
name = "faculties"
version = "0.11.2"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "An office suite for AI agents: kanban, wiki, files, messaging, and a GORBIE-backed viewer — all persisted in a TribleSpace pile."
authors = ["Jan-Paul Bultmann <jp@bultmann.eu>"]
homepage = "https://github.com/triblespace/faculties"
repository = "https://github.com/triblespace/faculties"
readme = "README.md"
keywords = ["triblespace", "ai-agent", "kanban", "wiki", "notebook"]
categories = ["command-line-utilities", "data-structures"]

# docs.rs should render all public API, including the optional
# `widgets` module (WikiViewer / CompassBoard / etc.) that depends
# on egui/GORBIE/cubecl.
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lib]
path = "src/lib.rs"

# GORBIE-backed viewer binary. Ships inside the crate so
# `cargo install faculties --features widgets` installs the viewer
# globally. Requires the `widgets` feature because the binary
# depends on the `widgets` module.
[[bin]]
name = "faculties-viewer"
path = "src/bin/faculties-viewer.rs"
required-features = ["widgets"]

[features]
default = []
# GORBIE-backed viewers for faculty branches. Enables the `widgets` module.
widgets = [
    "dep:GORBIE",
    "dep:egui",
    "dep:cubecl",
    "dep:ed25519-dalek",
    "dep:rand_core06",
    "dep:hifitime",
]

[dependencies]
triblespace = "0.36"
GORBIE = { version = "0.12", default-features = false, features = ["typst", "markdown"], optional = true }
egui = { version = "0.34", optional = true }
cubecl = { version = "0.9.0", default-features = false, features = ["wgpu", "std"], optional = true }
ed25519-dalek = { version = "2.1.1", optional = true }
rand_core06 = { package = "rand_core", version = "0.6.4", optional = true }
hifitime = { version = "4.1.2", optional = true }
